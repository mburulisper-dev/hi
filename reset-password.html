<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Nyumba Find</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="css/utils.css">
    <script src="js/utils.js"></script>
    <script src="js/api-client.js"></script>
    <script src="js/auth-helpers.js"></script>
</head>
<body>
    <div class="form-container">
        <h2>🔑 Reset Password</h2>
        <p class="form-subtitle">Create a new password for your account</p>
        
        <form id="resetForm" class="form">
            <div class="form-group">
                <label for="password"><i class="ri-lock-line"></i> New Password:</label>
                <input type="password" id="password" name="password" placeholder="At least 4 characters" required minlength="4" maxlength="20">
                <span class="form-error" id="passwordError"></span>
            </div>

            <div class="form-group">
                <label for="confirmPassword"><i class="ri-lock-line"></i> Confirm Password:</label>
                <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Re-enter your password" required minlength="4" maxlength="20">
                <span class="form-error" id="confirmError"></span>
            </div>

            <div class="password-requirements">
                <p style="font-size: 12px; color: #6b7280; margin-bottom: 15px;">
                    <i class="ri-information-line"></i> Password must be:
                </p>
                <ul style="font-size: 12px; color: #6b7280; padding-left: 20px; margin: 0;">
                    <li id="req-length">At least 4 characters long</li>
                    <li id="req-match">Passwords must match</li>
                </ul>
            </div>

            <button type="submit" class="btn-submit">
                <i class="ri-check-line"></i> Reset Password
            </button>
        </form>

        <p class="register-link">
            Already have access? <a href="login.html">Login here</a>
        </p>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/password-reset.js"></script>
</body>
</html>

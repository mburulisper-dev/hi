<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Nyumba Find</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="css/utils.css">
    <script src="js/utils.js"></script>
    <script src="js/api-client.js"></script>
    <script src="js/auth-helpers.js"></script>
</head>
<body>
    <div class="form-container">
        <h2>🔐 Forgot Password?</h2>
        <p class="form-subtitle">We'll help you recover your account</p>
        
        <form id="forgotForm" class="form">
            <div class="form-group">
                <label for="email"><i class="ri-mail-line"></i> Email Address:</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>
                <span class="form-error" id="emailError"></span>
            </div>

            <button type="submit" class="btn-submit">
                <i class="ri-mail-send-line"></i> Send Reset Link
            </button>
        </form>

        <div id="successMessage" style="display: none; padding: 20px; background: #ecfdf5; border: 1px solid #86efac; border-radius: 8px; text-align: center; margin-top: 20px;">
            <p style="color: #166534; font-weight: 600;">✅ Check your email!</p>
            <p style="color: #166534; margin-top: 10px;">We've sent a password reset link to your email. Click the link to create a new password.</p>
        </div>

        <p class="register-link">
            Remember your password? <a href="login.html">Login here</a>
        </p>

        <p style="text-align: center; margin-top: 20px; font-size: 12px; color: #6b7280;">
            Didn't receive an email? Check your spam folder or <a href="help.html" style="color: #2563eb;">contact support</a>
        </p>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/password-reset.js"></script>
</body>
</html>

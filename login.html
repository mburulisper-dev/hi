<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Nyumba Find</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="css/utils.css">
    
    <script src="js/api-client.js"></script>
    <script src="js/auth-helpers.js"></script>
</head>
<body>

    <div class="form-container">
        <!-- User Type Selection -->
        <div id="typeSelection" class="user-type-selection">
            <h2>Choose Account Type</h2>
            <p class="form-subtitle">Are you a student or landlord?</p>

            <div class="type-buttons">
                <button type="button" class="type-btn" id="studentBtn">
                    <i class="ri-user-line"></i> Student
                </button>
                
                <button type="button" class="type-btn" id="landlordBtn">
                    <i class="ri-building-line"></i> Landlord
                </button>
            </div>
        </div>

        <!-- Login Form -->
        <div id="loginForm" class="login-form-wrapper">
            <button type="button" class="back-btn" onclick="backToTypeSelection()">
                <i class="ri-arrow-left-line"></i> Back
            </button>

            <h2>Welcome Back!</h2>
            <p class="form-subtitle" id="typeSubtitle">Login to your account</p>

            <form id="loginFormElement">
                <div class="form-group">
                    <label for="email"><i class="ri-mail-line"></i> Email Address</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                    <span class="form-error" id="emailError"></span>
                </div>

                <div class="form-group">
                    <label for="password"><i class="ri-lock-line"></i> Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                    <span class="form-error" id="passwordError"></span>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" id="remember">
                        Remember me
                    </label>
                    <a href="forgot-password.html" class="forgot-link">Forgot password?</a>
                </div>

                <button type="submit" class="btn-submit">
                    <i class="ri-login-box-line"></i> Login
                </button>
            </form>

            <p class="register-link">
                Don't have an account? <a href="registration.html">Register here</a>
            </p>
        </div>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
